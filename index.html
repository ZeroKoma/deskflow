<!doctype html>
<html lang="es" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DeskFlow | Gestión de Productividad</title>
    <link
      rel="icon"
      type="image/svg+xml"
      href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512"><path fill="%232563eb" d="M128 64c0-35.3 28.7-64 64-64h128c35.3 0 64 28.7 64 64v64h64c35.3 0 64 28.7 64 64v288c0 35.3-28.7 64-64 64H64c-35.3 0-64-28.7-64-64V192c0-35.3 28.7-64 64-64h64V64zm64 64h128V64H192v64z"/></svg>'
    />
    <link rel="stylesheet" href="css/style.css" />
    <!-- Iconos vía FontAwesome (Opcional, pero recomendado para el look profesional) -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
  </head>
  <body>
    <!-- Overlay para el sidebar en móvil -->
    <div id="sidebar-overlay" class="sidebar-overlay"></div>
    <div class="app-container">
      <!-- Sidebar -->
      <aside class="sidebar open">
        <button type="button" class="sidebar-close-btn" id="sidebar-close-btn"><i class="fas fa-times"></i></button>
        <div class="logo">
          <div>
            <i class="fas fa-layer-group"></i>
            <span data-t="nav_logo">DeskFlow</span>
          </div>
          <div class="author">By ZeroKoma</div>
        </div>
        <nav class="nav-menu">
          <button class="nav-item active" data-view="dashboard">
            <i class="fas fa-chart-line"></i> <span data-t="nav_dashboard">Dashboard</span>
          </button>
          <button class="nav-item" data-view="calendar">
            <i class="fas fa-calendar-alt"></i> <span data-t="nav_calendar">Calendario</span>
            <span class="nav-badge" id="count-calendar">0</span>
          </button>
          <button class="nav-item" data-view="all-notes">
            <i class="fas fa-sticky-note"></i> <span data-t="nav_all_notes">Notas y Recordatorios</span>
            <span class="nav-badge" id="count-all">0</span>
          </button>
          <button class="nav-item" id="manage-tags-btn">
            <i class="fas fa-tags"></i> <span data-t="nav_manage_tags">Gestionar Tags</span>
            <span class="nav-badge" id="count-tags">0</span>
          </button>
          <button class="nav-item" id="manage-categories-btn">
            <i class="fas fa-folder"></i> <span data-t="nav_manage_categories">Gestionar Categorías</span>
            <span class="nav-badge" id="count-categories">0</span>
          </button>
          <button class="nav-item" id="manage-settings-btn">
            <i class="fas fa-cog"></i> <span data-t="nav_settings">Configuración</span>
          </button>
        </nav>

        <div class="sidebar-stats">
          <h3 data-t="stat_summary">Resumen</h3>
          <div class="stat-item" data-priority="high">
            <span><i class="fas fa-circle"></i> <span data-t="stat_high">Prioridad Alta</span></span>
            <span id="stat-high">0</span>
          </div>
          <div class="stat-item" data-priority="medium">
            <span><i class="fas fa-circle"></i> <span data-t="stat_medium">Prioridad Media</span></span>
            <span id="stat-medium">0</span>
          </div>
          <div class="stat-item" data-priority="low">
            <span><i class="fas fa-circle"></i> <span data-t="stat_low">Prioridad Baja</span></span>
            <span id="stat-low">0</span>
          </div>
          <div class="stat-item" data-filter="withAlarm">
            <span><i class="fas fa-bell"></i> <span data-t="stat_with_alarm">Con Alarma</span></span>
            <span id="stat-with-alarm">0</span>
          </div>
          <div class="stat-item" data-filter="expired">
            <span><i class="fas fa-history"></i> <span data-t="stat_expired">Caducadas</span></span>
            <span id="stat-expired-sidebar">0</span>
          </div>
        </div>

        <div class="theme-switch">
          <div class="theme-info">
            <i class="fas fa-moon"></i>
            <span data-t="theme_title">Modo Oscuro</span>
          </div>
          <label class="switch">
            <input type="checkbox" id="theme-toggle" checked />
            <span class="slider"></span>
          </label>
        </div>
      </aside>

      <!-- Main Content -->
      <main class="main-content">
        <header class="top-bar">
          <button id="sidebar-open-btn" class="hamburger-btn desktop-menu-btn" title="Cerrar menú">
            <i class="fas fa-times"></i>
          </button>
          <button id="search-toggle-btn" class="search-toggle-btn" title="Alternar búsqueda">
            <i class="fas fa-search"></i>
          </button>
          <div class="flex-center-gap-20 search-content-wrapper">
            <div class="search-box">
              <i class="fas fa-search"></i>
              <input
                type="text"
                id="global-search"
                data-t-placeholder="search_default"
                placeholder="Buscar notas..."
              />
            </div>
            <div style="display: flex; gap: 12px; align-items: center">
              <div style="display: flex; align-items: center; gap: 12px">
                <span
                  style="
                    font-size: 0.9rem;
                    font-weight: 500;
                    color: var(--text-main);
                  "
                   data-t="search_tags_label">Tags</span
                >
                <label class="switch">
                  <input type="checkbox" id="search-tags" />
                  <span class="slider"></span>
                </label>
              </div>
              <div style="display: flex; align-items: center; gap: 12px">
                <span
                  style="
                    font-size: 0.9rem;
                    font-weight: 500;
                    color: var(--text-main);
                  "
                   data-t="search_cat_label">Categoría</span
                >
                <label class="switch">
                  <input type="checkbox" id="search-categories" />
                  <span class="slider"></span>
                </label>
              </div>
            </div>
          </div>
          <div class="actions">
            <button id="add-note-btn" class="btn-primary" data-t="btn_create">Crear</button>
          </div>
        </header>

        <!-- Dynamic Views Container -->
        <section id="view-container">
          <!-- El contenido se genera dinámicamente con JS -->
        </section>
      </main>
    </div>

    <!-- Modal para Notas -->
    <div id="note-modal" class="modal">
      <div class="modal-content">
        <div class="modal-header">
          <h2 id="modal-title" data-t="note_new_note">Nueva Nota/Recordatorio</h2>
          <button type="button" class="close-icon-btn" id="modal-x">
            <i class="fas fa-times"></i>
          </button>
        </div>
        <form id="note-form">
          <input type="hidden" id="note-id" />
          <div class="form-group">
            <label><i class="fas fa-heading"></i> <span data-t="label_title">Título</span></label>
            <input
              type="text"
              id="title"
              required
              data-t-placeholder="label_title"
              placeholder="Ej: Reunión de ventas"
            />
          </div>
          <div class="form-row">
            <div class="form-group">
              <label><i class="far fa-calendar"></i> <span data-t="label_date">Fecha</span></label>
              <div style="display: flex; gap: 8px">
                <input type="date" id="date" style="flex: 1" />
                <button
                  type="button"
                  id="clear-date"
                  class="btn-ghost"
                  style="padding: 0 10px; border: 1px solid var(--border)"
                  title="Eliminar fecha"
                >
                  <i class="fas fa-eraser"></i>
                </button>
              </div>
            </div>
            <div class="form-group">
              <label><i class="far fa-clock"></i> <span data-t="label_time">Hora</span></label>
              <div style="display: flex; gap: 8px">
                <input type="time" id="time" style="flex: 1" />
                <button
                  type="button"
                  id="clear-time"
                  class="btn-ghost"
                  style="padding: 0 10px; border: 1px solid var(--border)"
                  title="Eliminar hora"
                >
                  <i class="fas fa-eraser"></i>
                </button>
              </div>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label><i class="fas fa-flag"></i> <span data-t="label_priority">Prioridad</span></label>
              <select id="priority">
                <option value="low" data-t="priority_low">Baja</option>
                <option value="medium" selected data-t="priority_medium">Media</option>
                <option value="high" data-t="priority_high">Alta</option>
              </select>
            </div>
            <div class="form-group">
              <label><i class="fas fa-tag"></i> <span data-t="label_category">Categoría</span></label>
              <select id="category">
                <!-- Dinámico -->
              </select>
            </div>
          </div>
          <div class="form-group">
            <label><i class="fas fa-align-left"></i> <span data-t="label_desc">Descripción</span></label>
            <textarea
              id="description"
              rows="3"
              data-t-placeholder="label_desc"
              placeholder="Detalles adicionales..."
            ></textarea>
          </div>
          <div class="form-group">
            <label><i class="fas fa-tags"></i> <span data-t="label_tags">Tags</span></label>
            <div id="tag-selection-container" class="tag-selection-list"></div>
          </div>
          <div class="form-group alarm-toggle">
            <label class="switch">
              <input type="checkbox" id="alarm" />
              <span class="slider"></span>
            </label>
            <span class="alarm-text" data-t="label_alarm">Activar alarma</span>
          </div>
          <div class="modal-actions">
            <button
              type="button"
              class="btn-ghost"
              id="delete-note-modal"
              style="
                color: var(--high);
                font-weight: 600;
                margin-right: auto;
                display: none;
              "
            >
              <i class="fas fa-trash" style="margin-right: 0.25rem"></i>
              <span data-t="btn_delete">Eliminar</span>
            </button>
            <button type="button" class="btn-ghost" id="close-modal" data-t="btn_cancel">
              Cancelar
            </button>
            <button type="submit" class="btn-primary" data-t="btn_save">Guardar</button>
          </div>
        </form>
      </div>
    </div>

    <!-- Modal Configuración -->
    <div id="settings-modal" class="modal">
      <div class="modal-content" style="max-width: 450px">
        <div class="modal-header">
          <h2 data-t="settings_title">Configuración</h2>
          <button type="button" class="close-icon-btn" id="close-settings-x">
            <i class="fas fa-times"></i>
          </button>
        </div>
        <div
          class="settings-body"
          style="display: flex; flex-direction: column; gap: 1rem"
        >
          <section>
            <h4 style="margin-bottom: 0.5rem; color: var(--text-muted)" data-t="settings_data">
              Gestión de Datos
            </h4>
            <div style="display: flex; flex-direction: column; gap: 0.75rem">
              <button
                id="export-data"
                class="btn-secondary"
                style="width: 100%"
              >
                <i class="fas fa-file-export"></i> <span data-t="nav_export">Exportar (JSON)</span>
              </button>
              <button
                id="import-data-btn"
                class="btn-secondary"
                style="width: 100%"
              >
                <i class="fas fa-file-import"></i> <span data-t="nav_import">Importar (JSON)</span>
              </button>
              <input
                type="file"
                id="import-data-input"
                accept=".json"
                style="display: none"
              />
            </div>
            <div id="storage-info"></div>
          </section>
          <section
            style="
              margin-top: 1rem;
              padding-top: 1rem;
              border-top: 1px solid var(--border);
            "
          >
            <h4 style="margin-bottom: 0.5rem; color: var(--text-muted)" data-t="settings_maint">
              Mantenimiento
            </h4>
            <button
              id="delete-past-notes-btn"
              class="btn-secondary"
              style="
                width: 100%;
                border-color: var(--medium);
                color: var(--medium);
              "
            >
              <i class="fas fa-broom"></i> <span data-t="nav_delete_past">Limpiar Notas Pasadas</span>
            </button>
          </section>
          <section
            style="
              margin-top: 1rem;
              padding-top: 1rem;
              border-top: 1px solid var(--border);
            "
          >
            <h4 style="margin-bottom: 0.5rem; color: var(--high)" data-t="settings_danger">
              Zona de Peligro
            </h4>
            <button id="reset-app-btn" class="btn-danger" style="width: 100%">
              <i class="fas fa-trash-alt"></i> <span data-t="nav_reset">Resetear Aplicación Completamente</span>
            </button>
          </section>
        </div>
        <div class="modal-actions">
          <button
            type="button"
            class="btn-primary"
            id="close-settings-btn"
            style="width: 100%"
          >
            <span data-t="btn_close">Cerrar</span>
          </button>
        </div>
      </div>
    </div>

    <!-- Modal de Confirmación Personalizado -->
    <div id="confirm-modal" class="modal">
      <div
        class="modal-content"
        style="max-width: 400px; text-align: center; padding: 2rem"
      >
        <div style="color: var(--high); font-size: 3rem; margin-bottom: 1rem">
          <i class="fas fa-exclamation-circle"></i>
        </div>
        <h3
          id="confirm-message"
          style="margin-bottom: 1.5rem; color: var(--text-main)"
          data-t="conf_ok_title"
        >
          ¿Estás seguro?
        </h3>
        <div class="modal-actions" style="justify-content: center; gap: 1rem">
          <button type="button" class="btn-ghost" id="confirm-cancel" data-t="conf_cancel">
            Cancelar
          </button>
          <button type="button" class="btn-danger" id="confirm-ok" data-t="conf_ok">
            Eliminar
          </button>
        </div>
      </div>
    </div>

    <!-- Modal Gestión de Tags -->
    <div id="tag-manager-modal" class="modal">
      <div class="modal-content">
        <div class="modal-header">
          <h2 data-t="tag_mgr_title">Gestionar Tags</h2>
          <button type="button" class="close-icon-btn" id="close-tag-manager">
            <i class="fas fa-times"></i>
          </button>
        </div>
        <div class="tag-manager-body">
          <form id="tag-form">
            <input type="hidden" id="tag-id" />
            <input
              type="text"
              id="tag-name"
              data-t-placeholder="tag_mgr_placeholder"
              placeholder="Nuevo tag..."
              required
              style="flex: 1"
            />
            <input type="color" id="tag-color" value="#2563eb" />
            <button type="submit" class="btn-primary" id="tag-submit-btn" data-t="btn_add">
              Añadir
            </button>
          </form>
          <div
            id="tags-list-container"
            style="max-height: 300px; overflow-y: auto"
          >
            <!-- Lista de tags dinámicos -->
          </div>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn-primary" id="close-tag-manager-btn">
            <span data-t="btn_close">Cerrar</span>
          </button>
        </div>
      </div>
    </div>

    <!-- Modal Gestión de Categorías -->
    <div id="category-manager-modal" class="modal">
      <div class="modal-content">
        <div class="modal-header">
          <h2 data-t="cat_mgr_title">Gestionar Categorías</h2>
          <button
            type="button"
            class="close-icon-btn"
            id="close-category-manager"
          >
            <i class="fas fa-times"></i>
          </button>
        </div>
        <div class="tag-manager-body">
          <form
            id="category-form"
            style="
              display: flex;
              gap: 10px;
              margin-bottom: 1.5rem;
              align-items: center;
            "
          >
            <input type="hidden" id="category-id" />
            <input
              type="text"
              id="category-name"
              data-t-placeholder="cat_mgr_placeholder"
              placeholder="Nueva categoría..."
              required
              style="flex: 1"
            />
            <input
              type="color"
              id="category-color"
              value="#2563eb"
              style="
                width: 50px;
                height: 42px;
                padding: 0;
                border-radius: 8px;
                overflow: hidden;
                border: 1px solid var(--border);
                background: var(--bg-main) !important;
              "
            />
            <button type="submit" class="btn-primary" id="category-submit-btn" data-t="btn_add">
              Añadir
            </button>
          </form>
          <div
            id="categories-list-container"
            style="max-height: 300px; overflow-y: auto"
          >
            <!-- Lista dinámica -->
          </div>
        </div>
        <div class="modal-actions">
          <button
            type="button"
            class="btn-primary"
            id="close-category-manager-btn"
          >
            <span data-t="btn_close">Cerrar</span>
          </button>
        </div>
      </div>
    </div>

    <!-- Overlay para alarmas activas (bloqueo y difuminado) -->
    <div id="alarm-overlay" class="alarm-overlay"></div>

    <!-- Tooltip dinámico para notas -->
    <div id="note-tooltip" class="note-tooltip"></div>

    <!-- Toast Notifications Container -->
    <div id="toast-container"></div>

    <script type="module" src="app.js"></script>
  </body>
</html>
